<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You're Offline — QualityVoice</title>
    <style>
      :root {
        --brand: #5B4FE8;
        --bg: #F8FAFC;
        --text1: #0F172A;
        --text2: #475569;
        --border: #E2E8F0;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text1);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .icon {
        width: 100px;
        height: 100px;
        background: linear-gradient(135deg, #5B4FE8, #7C3AED);
        border-radius: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        box-shadow: 0 20px 40px rgba(91,79,232,0.3);
      }
      .icon svg { width: 48px; height: 48px; color: white; }
      h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 12px; }
      p { font-size: 16px; color: var(--text2); line-height: 1.6; max-width: 320px; margin: 0 auto 32px; }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(135deg, #5B4FE8, #7C3AED);
        color: white;
        font-weight: 700;
        font-size: 15px;
        border: none;
        border-radius: 14px;
        padding: 14px 28px;
        cursor: pointer;
        box-shadow: 0 10px 30px rgba(91,79,232,0.3);
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 35px rgba(91,79,232,0.4); }
      .tips {
        margin-top: 40px;
        padding: 20px;
        background: white;
        border: 1px solid var(--border);
        border-radius: 16px;
        max-width: 320px;
        width: 100%;
        text-align: left;
      }
      .tips h3 { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--brand); margin-bottom: 12px; }
      .tips li { font-size: 14px; color: var(--text2); margin-bottom: 8px; padding-left: 4px; }
    </style>
  </head>
  <body>
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>QualityVoice needs an internet connection to show you local reviews and shops. Check your connection and try again.</p>
    <button class="btn" onclick="window.location.reload()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Try Again
    </button>
    <div class="tips">
      <h3>While You Wait</h3>
      <ul style="list-style:none">
        <li>📶 Check your Wi-Fi or mobile data</li>
        <li>✈️ Turn off airplane mode if enabled</li>
        <li>🔄 Reload the page once connected</li>
      </ul>
    </div>
  </body>
</html>
